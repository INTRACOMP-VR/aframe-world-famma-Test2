<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>famma-Test2</title>
		<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
		<script src="https://unpkg.com/@softeng-761-2025-team-10/aframe-inspector/dist/aframe-inspector.min.js"></script>
	</head>
	<body>
		<a-scene>
			<a-light type="ambient" color="#445566" intensity="1"></a-light>
			<a-light
				type="directional"
				position="2 4 3"
				intensity="1"
			></a-light>
			<a-light
				type="point"
				position="-2 3 0"
				color="#FF6B6B"
				intensity="1"
			></a-light>

			<a-box
				id="blue-box"
				position="-1.5 0.5 -3"
				rotation="0 45 0"
				material="color: #4CC3D9; metalness: 0.8; roughness: 0.2"
				shadow="cast: true; receive: false"
			></a-box>

			<a-sphere
				id="red-sphere"
				position="0 1.25 -5"
				radius="1.25"
				material="color: #EF2D5E; metalness: 0.3; roughness: 0.7"
				shadow="cast: true; receive: false"
			></a-sphere>

			<a-cylinder
				id="yellow-cylinder"
				position="1.5 0.75 -3"
				radius="0.5"
				height="1.5"
				material="color: #FFC65D; metalness: 0.1; roughness: 0.4"
				shadow="cast: true; receive: false"
			></a-cylinder>

			<a-torus
				id="purple-torus"
				position="-2.5 1 -5"
				radius="0.6"
				radius-tubular="0.15"
				material="color: #A855F7; metalness: 0.9; roughness: 0.1"
				shadow="cast: true; receive: false"
			></a-torus>

			<a-dodecahedron
				id="green-dodecahedron"
				position="2.5 1.2 -5"
				radius="0.7"
				material="color: #10B981; metalness: 0.5; roughness: 0.5"
				shadow="cast: true; receive: false"
			></a-dodecahedron>
		</a-scene>
	</body>
</html>
